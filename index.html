<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>analyzer lol</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Mono&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --line: #1a1a1a;
            --text: #fff;
            --muted: #777;
            --accent: #ff3b3b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* MOBILE (DEFAULT) */
        .wrap {
            width: 100%;
            margin: 0;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
        }

        /* DESKTOP (PC) OPTIMIZATION */
        @media screen and (min-width: 768px) {
            .wrap {
                max-width: 420px;
                height: 85vh;
                margin: 0 auto;
                border: 1px solid #1a1a1a;
                border-radius: 12px;
                overflow-y: auto;
                min-height: auto;
            }
        }

        /* CUSTOM SCROLLBAR for desktop-like behavior in .wrap */
        .wrap::-webkit-scrollbar {
            width: 4px;
        }
        .wrap::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .logo {
            font-size: 21px;
            font-weight: 500;
            letter-spacing: -0.2px;
            margin-bottom: 2px;
        }

        .sub {
            font-family: 'Space Mono';
            font-size: 11px;
            color: var(--muted);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .divider {
            height: 1px;
            background: #1a1a1a;
            margin: 0 0 20px;
        }

        .modes-label {
            font-family: 'Space Mono';
            font-size: 11px;
            color: #666;
            margin-bottom: 10px;
        }

        .home-actions {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex: 1;
        }

        .bottom-strip {
            margin-top: 24px;
            padding: 14px;
            border: 1px solid #1a1a1a;
            font-family: 'Space Mono';
            font-size: 11px;
            color: #666;
            background: #0d0d0d;
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: 1px solid var(--line);
            background: #111;
            color: #fff;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #151515;
            border-color: #333;
        }

        .block {
            border: 1px solid var(--line);
            background: #0d0d0d;
            padding: 16px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--line);
            background: #080808;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #333;
        }

        .panel {
            margin-top: 16px;
            border: 1px solid var(--line);
            padding: 16px;
            background: #0d0d0d;
            min-height: 60px;
            font-size: 13px;
        }

        .card {
            border: 1px solid var(--line);
            margin-top: 10px;
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: .3s ease-out;
            background: #0d0d0d;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .bar {
            height: 3px;
            background: repeating-linear-gradient(
                to right,
                #222 0px,
                #222 2%,
                transparent 2%,
                transparent 4%
            );
            margin-top: 8px;
            position: relative;
        }

        .bar span {
            display: block;
            height: 100%;
            background: var(--accent);
            mix-blend-mode: color-dodge;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #555;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            text-align: left;
            padding: 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .credit {
            margin-top: 20px;
            font-size: 11px;
            text-align: center;
            color: #444;
        }

        .perc {
            font-family: 'Space Mono';
            font-size: 9px;
            color: #555;
            margin-top: 8px;
            display: block;
            text-transform: uppercase;
        }

        .verdict {
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
