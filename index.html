    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --line: #1a1a1a;
            --text: #fff;
            --muted: #777;
            --accent: #ff3b3b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
            margin: 0;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MOBILE (DEFAULT) */
        .wrap {
            width: 100%;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            padding: 24px 20px;
            padding-top: calc(24px + env(safe-area-inset-top));
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        #home {
            justify-content: space-between;
        }

        /* DESKTOP (PC) OPTIMIZATION */
        @media screen and (min-width: 768px) {
            .wrap {
                max-width: 420px;
                height: 85vh;
                margin: 0 auto;
                border: 1px solid #1a1a1a;
                border-radius: 12px;
                min-height: auto;
            }
        }

        .page {
            display: none;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .logo {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.2px;
            margin-bottom: 2px;
        }

        #home .logo {
            font-size: 28px;
        }

        .sub {
            font-family: 'Space Mono';
            font-size: 12px;
            color: var(--muted);
            margin-top: 0;
            margin-bottom: 12px;
        }

        #home .sub {
            margin-bottom: 16px;
        }

        .divider {
            height: 1px;
            background: #1a1a1a;
            margin: 0 0 12px;
        }

        .modes-label {
            font-family: 'Space Mono';
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }

        .home-actions {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            gap: 10px;
        }

        .home-actions .btn {
            margin-top: 0;
            padding: 18px;
            font-size: 15px;
        }

        .bottom-strip {
            margin-top: auto;
            padding: 14px;
            border: 1px solid #1a1a1a;
            font-family: 'Space Mono';
            font-size: 11px;
            color: #666;
            background: #0d0d0d;
        }

        .btn {
            width: 100%;
            padding: 18px;
            margin-top: 8px;
            border: 1px solid var(--line);
            background: #111;
            color: #fff;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .btn:hover {
            background: #151515;
            border-color: #333;
        }

        .block {
            border: 1px solid var(--line);
            background: #0d0d0d;
            padding: 14px;
            margin-top: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--line);
            background: #080808;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #333;
        }

        .panel {
            margin-top: 10px;
            border: 1px solid var(--line);
            padding: 14px;
            background: #0d0d0d;
            min-height: 50px;
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .card {
            border: 1px solid var(--line);
            margin-top: 8px;
            padding: 14px;
            opacity: 0;
            transform: translateY(8px);
            transition: .3s ease-out;
            background: #0d0d0d;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .bar {
            height: 3px;
            background: repeating-linear-gradient(to right,

                    #222 2%,
                    transparent 2%,
                    transparent 4%);
            margin-top: 8px;
            position: relative;
        }

        .bar span {
            display: block;
            height: 100%;
            background: var(--accent);
            mix-blend-mode: color-dodge;

        .back {

            border: none;

            text-align: left;

        /* HELPERS */

        function normalize(str) {
            return String(str).toLowerCase().replace(/\s+/g, "").trim();
        }

        function hash(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = str.charCodeAt(i) + ((h << 5) - h);
            }
            return Math.abs(h);
        }

        function pick(arr, seed) {
            return arr[seed % arr.length];
        }

        /* RUN */

            let nameA = "you";
            let nameB = "them";

                const v1 = document.getElementById('c1').value;
                const v2 = document.getElementById('c2').value;
                if (v1) nameA = v1;
                if (v2) nameB = v2;
                base = normalize(v1) + normalize(v2);

                if (v1) nameA = v1;

                if (v) nameA = v;
                base = normalize(v);
            }

                    let result = pick(data, seed + i);
                    result = result.replace(/{A}/g, nameA).replace(/{B}/g, nameB);

                    const rawScore = Math.abs((seed * (i + 5)) % 100);
                    const score = Math.round(rawScore / 2) * 2;

                    setTimeout(() => {

                        const card = document.createElement("div");
                        card.className = "card";

                        card.innerHTML = `
                  <div class="verdict">${result}</div>
                  <span class="perc">${score}% match</span>
                  <div class="bar"><span style="width:${score}%"></span></div>
                `;

                        out.appendChild(card);

                        requestAnimationFrame(() => {
                            card.classList.add("show");
                        });

                    }, i * 200);
                }

            }, 800);
        }
    </script>

</body>

</html>
